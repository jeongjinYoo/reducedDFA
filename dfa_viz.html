<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DFA Visualizer</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; margin:0; padding:0}
    header{padding:10px;background:#222;color:#fff}
    main{padding:10px}
    #controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    #viz{width:100%;height:80vh;overflow:auto;border:1px solid #ddd;background:#fff}
    select,button{padding:6px 10px;font-size:14px}
    .note{font-size:13px;color:#666;margin-top:8px}
  </style>
</head>
<body>
  <header>
    <strong>DFA Visualizer</strong>
  </header>
  <main>
    <div id="controls">
      <label for="dotFile">DOT 파일:</label>
      <select id="dotFile"></select>
      <button id="loadBtn">Load</button>
      <button id="downloadSvg">Download SVG</button>
    </div>
    <div class="note">이 페이지와 `generated/dfa2.dot`/`generated/dfa3.dot`은 같은 폴더에 있어야 합니다. 로컬 서버에서 열어주세요. 예: <code>python3 -m http.server 8000</code></div>
    <div id="viz"></div>
  </main>

  <script src="viz.js"></script>
  <script src="full.render.js"></script>

  <script>
    const vizContainer = document.getElementById('viz');
    const loadBtn = document.getElementById('loadBtn');
    const select = document.getElementById('dotFile');
    const downloadBtn = document.getElementById('downloadSvg');

    if (typeof Viz === 'undefined') {
      vizContainer.innerHTML = '<pre style="color:red">Error: Viz is not defined. Check that /viz.js loaded.</pre>';
      console.error('Viz is not defined');
    } else if (typeof Viz.render === 'undefined' || typeof Viz.Module === 'undefined') {
      vizContainer.innerHTML = '<pre style="color:red">Error: Viz.render or Viz.Module not present. full.render.js may not have initialized properly.</pre>';
      console.error('Viz.render or Viz.Module missing', { render: Viz.render, Module: Viz.Module });
    }

    const viz = new Viz();

    async function renderDot(path) {
      vizContainer.innerHTML = 'Loading ' + path + '...';
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        const dot = await res.text();
        const svgEl = await viz.renderSVGElement(dot);
        vizContainer.innerHTML = '';
        vizContainer.appendChild(svgEl);
      } catch (e) {
        vizContainer.innerHTML = '<pre style="color:red">' + (e.message || e) + '</pre>';
        console.error(e);
      }
    }

    async function listGeneratedDotFiles(pattern) {
      try {
        const res = await fetch('generated/');
        if (!res.ok) throw new Error('Failed to list generated files: ' + res.status);
        const text = await res.text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        return Array.from(doc.querySelectorAll('a'))
          .map(a => a.getAttribute('href'))
          .filter(name => name && pattern.test(name))
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }))
          .map(name => 'generated/' + name);
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    async function populateDotFiles() {
      const files = await listGeneratedDotFiles(/^dfa_\d+\.dot$/i);
      if (!files || files.length === 0) {
        select.innerHTML = '<option value="">No generated DFA dot files found.</option>';
        return;
      }
      select.innerHTML = files.map(path => `<option value="${path}">${path}</option>`).join('');
      renderDot(files[0]);
    }

    loadBtn.addEventListener('click', () => renderDot(select.value));
    populateDotFiles();

    downloadBtn.addEventListener('click', () => {
      const svg = vizContainer.querySelector('svg');
      if (!svg) return alert('SVG가 아직 렌더링되지 않았습니다.');
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(svg);
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = select.value.replace('.dot', '.svg');
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    window.addEventListener('load', () => renderDot(select.value));
  </script>
</body>
</html>
